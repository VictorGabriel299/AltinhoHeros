function pause() {
  if (state !== "game" && state !== "paused") return

  if (state === "game") {
    state = "paused"

    const cx = c.width / 2
    const cy = c.height / 2
    const r = Math.max(c.width, c.height) / 1.2

    const g = ctx.createRadialGradient(
      cx, cy, r * 0.1,
      cx, cy, r
    )

    g.addColorStop(0, "rgba(35, 89, 67, 0.1)")
    g.addColorStop(0.6, "rgba(24, 64, 48, 0.3)")
    g.addColorStop(1, "rgba(16, 46, 34, 0.5)")

    ctx.fillStyle = g
    ctx.fillRect(0, 0, c.width, c.height)

    ctx.fillStyle = "#fff"
    ctx.font = "24px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.fillText("Pausado", cx, cy)
  }
  else {
    state = "game"
  }
}

function isOnHouse(h,p) {
    const size = 64*eneScale
    
    return p.x < h.x + size &&
       p.x + p.w > h.x &&
       p.y < h.y &&
       p.y + p.h > h.y - size * h.floors
}

function houseRamp(h,p) {
    const rampStart = h.x + 30
    const rampEnd = h.x + h.w - 30
    if(p.x >= h.x && p.x <= h.x + h.w){
            const rampHeight = 64*eneScale*(h.floors-1)
            let yMod = clamp(0, 1, ((p.x - rampStart) / (rampEnd - rampStart)))
            if(h.direction==="down") yMod = 1 - yMod
            
            const height = h.y - yMod*rampHeight
            
            if(p.y + p.h > height) {
                            p.y = height - p.h
                            p.vy = 0
                            p.onGround = true
            }
    }
}

function enemyHit(player,enemy){

if (enemy.dead || player.dead) return

if(
player.vy > 0 &&
player.y + player.h - player.vy <= enemy.y &&
player.y + player.h >= enemy.y &&
player.x + player.w > enemy.x &&
player.x < enemy.x + enemy.w
){
enemy.dead=true
enemy.animFrame = 0
enemy.state = "dead"
player.vy=-10
return "stomp"
}

if(
player.x<enemy.x+enemy.w &&
player.x+player.w>enemy.x &&
player.y<enemy.y+enemy.h &&
player.y+player.h>enemy.y &&
player.immortal
){
enemy.dead=true
enemy.animFrame = 0
enemy.state = "dead"
if(!player.pastelBoost) {
    audios.pastelDash.pause()
    audios.pastelDash.currentTime = 0
    audios.pastelDash.play()
}
player.pastelBoost = 40
return "killed"
}

if(
player.x<enemy.x+enemy.w &&
player.x+player.w>enemy.x &&
player.y<enemy.y+enemy.h &&
player.y+player.h>enemy.y &&
!player.immortal
){
return "player"
}

return null
}

function solidCollision(a,b){
if(!rect(a,b))return

const dx1 = a.x + a.w - b.x
const dx2 = b.x + b.w - a.x
const dy1 = a.y + a.h - b.y
const dy2 = b.y + b.h - a.y

const minX = Math.min(dx1,dx2)
const minY = Math.min(dy1,dy2)

if(minX < minY){
if(dx1 < dx2) a.x = b.x - a.w
else a.x = b.x + b.w
}
else{
if(dy1 < dy2){
a.y = b.y - a.h
a.vy = 0
a.onGround = true
}
else{
a.y = b.y + b.h
a.vy = 0
}
}
}

function solidCollisionForStroll(a,b){
if(!rect(a,b))return

const dx1 = a.x + a.w - b.x
const dx2 = b.x + b.w - a.x
const dy1 = a.y + a.h - b.y
const dy2 = b.y + b.h - a.y

const minX = Math.min(dx1,dx2)
const minY = Math.min(dy1,dy2)

if(minX < minY){
a.vx *= -1
if(dx1 < dx2) a.x = b.x - a.w
else a.x = b.x + b.w
}
else{
if(dy1 < dy2){
a.y = b.y - a.h
a.vy = 0
a.onGround = true
}
else{
a.y = b.y + b.h
a.vy = 0
}
}
}

function drawTopPlatform(p){
    const img = platformImgs[p.type] || platformImgs.stone1
    if(!img || !img.complete) return

    const tileW = 16 * objScale
    const tileH = 512 * objScale

    let visualStart = Math.floor(p.x - cameraX - tileW)
    const startY = Math.floor(p.y - 40*objScale - cameraY)

    const tiles = Math.ceil(p.w / tileW)

    for(let i = 0; i < tiles + 2; i++){
        let sx

        if(i === 1){
            sx = 0
            visualStart = visualStart + 13
        }
        else if(i === tiles + 1){
            sx = 33
            visualStart = visualStart - 13
        }
        else{
            sx = 17
            visualStart = Math.floor(p.x - cameraX - tileW)
        }
        
        const offsetI = i === 0 ? 1 : i === 1 ? 0 : i

        ctx.drawImage(
            img,
            sx, 0, 16, 512,
            visualStart + offsetI * tileW,
            startY,
            tileW,
            tileH
        )
    }
}

function drawEnemy(enemy) {
    const size = 64
    const isDead = enemy.state === "dead"
    const isIdle = enemy.state === "idle"

    const frames = 4
    const frame = Math.floor(enemy.animFrame || 0) % frames
    const animY = isDead ? 65 : isIdle ? 128 : 0

    const drawSize = size * eneScale / 2
    const drawX = enemy.x - cameraX + enemy.w / 2 - drawSize / 2.2
    const drawY = enemy.y + enemy.h - drawSize - cameraY

    ctx.save()

    if (!isDead && enemy.vx > 0) {
        ctx.translate(drawX + drawSize, drawY)
        ctx.scale(-1, 1)
        ctx.drawImage(
            enemy.img,
            frame * size,
            animY,
            size,
            size,
            0,
            0,
            drawSize,
            drawSize
        )
    } else {
        ctx.drawImage(
            enemy.img,
            frame * size,
            animY,
            size,
            size,
            drawX,
            drawY,
            drawSize,
            drawSize
        )
    }

    ctx.restore()

    enemy.animFrame = (enemy.animFrame || 0) + (isDead && enemy.animFrame >= 4 ? -0.15 : isDead && enemy.animFrame < 4 ? 0.15 : 0.15)
}

let lastTime = 0
let accumulator = 0

const frameTime = 1000 / 60

function loop(time){
    if(!lastTime) lastTime = time

    let delta = time - lastTime
    lastTime = time

    if(delta > 100) delta = 100

    accumulator += delta

    while(accumulator >= frameTime){
        if(state === "game"){
            update()
        }
        accumulator -= frameTime
    }

    if(state === "game"){
        draw()
    }
    else if(state === "paused"){
        drawPaused()
    }
    else if(state === "startScreen"){
        startScreen()
    }
    else if(state === "demo"){
        demoFinished()
    }

    requestAnimationFrame(loop)
}
